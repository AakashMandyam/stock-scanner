name: Daily MACD Scanner

on:
  schedule:
    - cron: '30 21 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily scan
        run: python main.py scan

      - name: Regenerate dashboard
        run: python generate_dashboard.py

      - name: Commit updated data
        run: |
          git config user.name "MACD Scanner Bot"
          git config user.email "scanner@bot.local"
          git add portfolio.json trades.csv scan_log.csv dashboard.html alerts.csv
          git diff --cached --quiet || git commit -m "Daily scan $(date +%Y-%m-%d)"
          git pull --rebase origin main
          git push

  deploy:
    needs: scan
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Pull latest
        run: git pull origin main

      - name: Create pages directory
        run: |
          mkdir -p _site
          cp dashboard.html _site/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
