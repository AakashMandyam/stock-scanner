name: Intraday Monitor

on:
  schedule:
    # Runs every 2 hours during US market hours (UTC times)
    # 10:30 AM ET = 14:30 UTC
    # 12:30 PM ET = 16:30 UTC
    # 2:30 PM ET  = 18:30 UTC
    - cron: '30 14,16,18 * * 1-5'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run intraday monitor
        run: python intraday_monitor.py

      - name: Regenerate dashboard
        run: python generate_dashboard.py

      - name: Commit updates
        run: |
          git config user.name "MACD Scanner Bot"
          git config user.email "scanner@bot.local"
          git add portfolio.json trades.csv alerts.csv dashboard.html scan_log.csv
          git diff --cached --quiet || git commit -m "Intraday check $(date +%Y-%m-%d_%H%M)"
          git push
